<style>

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes scanLine{0%{top:12%}100%{top:88%}}
.screen{position:absolute;inset:0}.hidden{display:none!important}
.nx-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font:13px var(--font);outline:none;transition:border .3s,box-shadow .3s}
.nx-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}.nx-input::placeholder{color:var(--text3)}
textarea.nx-input{resize:vertical;min-height:72px}
.nx-label{color:var(--text3);font-size:9px;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:6px}.field{margin-bottom:18px}
.btn{border:none;border-radius:50px;padding:11px 22px;font:12px/1 var(--font);font-weight:500;cursor:pointer;letter-spacing:.5px;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.35;cursor:default;transform:none}
.btn-p{background:var(--accent);color:var(--bg)}.btn-p:hover:not(:disabled){box-shadow:0 0 20px var(--accent-glow)}
.btn-s{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-s:hover{border-color:var(--border2);background:var(--surface)}
.btn-g{background:transparent;color:var(--text3)}
.btn-i{background:var(--intro);color:var(--bg);font-weight:500}.btn-i:hover:not(:disabled){box-shadow:0 0 20px rgba(240,208,90,.2)}

.tag-education{color:var(--education);border-color:rgba(184,90,240,.2);background:rgba(184,90,240,.06)}
.badge{min-width:18px;height:18px;border-radius:9px;background:var(--danger);color:#fff;font-size:9px;font-weight:500;display:flex;align-items:center;justify-content:center;padding:0 5px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 20px;display:flex;align-items:center;gap:10px;z-index:9999;animation:slideUp .4s ease;box-shadow:0 10px 40px rgba(0,0,0,.4)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;backdrop-filter:blur(10px)}
.panel{position:absolute;right:0;top:0;bottom:0;width:min(420px,100vw);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;animation:slideIn .3s ease}
.panel-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.panel-tabs{display:flex;border-bottom:1px solid var(--border)}
.panel-tab{flex:1;padding:12px 0;display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--text3);transition:.3s;font-family:var(--font)}
.panel-tab.on{color:var(--accent);border-bottom-color:var(--accent)}.panel-tab.on-i{color:var(--intro);border-bottom-color:var(--intro)}
.panel-tab span{font-size:8px;letter-spacing:1.5px;text-transform:uppercase}
.panel-body{flex:1;overflow-y:auto;padding:22px}
.user-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(34,34,51,.5);animation:fadeUp .3s ease both}

.user-row .info .meta{color:var(--text3);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;box-shadow:0 16px 48px rgba(0,0,0,.4);animation:fadeUp .3s ease}
.card .close{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--text3);cursor:pointer;padding:4px}.card .close:hover{color:var(--text)}
.bottom-nav{position:absolute;bottom:0;left:50%;transform:translateX(-50%);display:flex;background:var(--surface);border-radius:18px 18px 0 0;border:1px solid var(--border);border-bottom:none;z-index:10;overflow:hidden}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:12px 20px;background:none;border:none;color:var(--text3);cursor:pointer;font-family:var(--font);transition:.2s;position:relative}
.nav-btn:hover{color:var(--accent)}.nav-btn span{font-size:7px;letter-spacing:1.5px;text-transform:uppercase}
.filters{position:absolute;top:76px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:3px;background:var(--surface);padding:3px;border-radius:50px;border:1px solid var(--border)}
.fpill{background:transparent;color:var(--text3);border:none;border-radius:50px;padding:5px 13px;font:10px/1 var(--font);font-weight:500;cursor:pointer;letter-spacing:.8px;text-transform:uppercase;transition:.3s}
.fpill.on{color:var(--bg)}
.activity-item{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid rgba(34,34,51,.3);animation:fadeUp .3s ease both}
.activity-item .dot-line{display:flex;flex-direction:column;align-items:center}
.activity-item .a-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.activity-item .a-line{width:1px;flex:1;background:var(--border);margin-top:4px}
.activity-item .a-text{font-size:12px;line-height:1.5;color:var(--text2)}.activity-item .a-text strong{color:var(--text);font-weight:500}
.activity-item .a-time{color:var(--text3);font-size:10px;margin-top:3px}
</style>
</head>

function av(u,sz=40,ring=false){
  const ini=(u.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const col=u.isSelf?C.accent:C.career;

}
function toast(msg){const t=document.createElement('div');t.className='toast';t.innerHTML=`<span style="color:${C.accent}">${IC.check}</span><span style="font-size:12px">${msg}</span>`;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},2500)}
function genQR(text,sz=160){const gs=21,grid=Array.from({length:gs},()=>Array(gs).fill(false));const df=(r,c)=>{for(let i=0;i<7;i++)for(let j=0;j<7;j++){if(i===0||i===6||j===0||j===6||(i>=2&&i<=4&&j>=2&&j<=4))if(r+i<gs&&c+j<gs)grid[r+i][c+j]=true}};df(0,0);df(0,14);df(14,0);let h=0;for(let i=0;i<text.length;i++)h=((h<<5)-h+text.charCodeAt(i))|0;for(let r=0;r<gs;r++)for(let c=0;c<gs;c++){if(!grid[r][c]){const v=Math.sin(h*(r*gs+c+1)*.01)*10000;grid[r][c]=v-Math.floor(v)>.45}};const cs=sz/21;let s=`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><rect width="${sz}" height="${sz}" fill="${C.bg}" rx="6"/>`;grid.forEach((row,r)=>row.forEach((cell,c)=>{if(cell)s+=`<rect x="${c*cs+.5}" y="${r*cs+.5}" width="${cs-1}" height="${cs-1}" rx="1" fill="${C.accent}"/>`}));return s+'</svg>'}
function cPath(x1,y1,x2,y2){const dx=x2-x1,dy=y2-y1,d=Math.sqrt(dx*dx+dy*dy);if(d===0)return`M ${x1} ${y1} L ${x2} ${y2}`;const cur=d*.3,nx=-dy/d,ny=dx/d,side=Math.sin(x1*3+y1*5)>0?1:-1;return`M ${x1} ${y1} Q ${(x1+x2)/2+nx*cur*side} ${(y1+y2)/2+ny*cur*side} ${x2} ${y2}`}

function forceLayout(center,conns){
  const nodes=[{...center,x:0,y:0,depth:0,isSelf:true,vx:0,vy:0,fixed:true}];const edges=[];
  const n=conns.length;if(!n)return{nodes,edges};const step=(Math.PI*2)/n;
  conns.forEach((c,i)=>{const a=step*i-Math.PI/2;const r=130+Math.sin(a*5+i)*25;nodes.push({...c,x:Math.cos(a)*r,y:Math.sin(a)*r,depth:1,vx:0,vy:0});edges.push({from:center.id||'you',to:c.id});
    const sub=c.network||[];const ss=sub.length>0?Math.PI*.6/(sub.length-1||1):0;const sa=a-Math.PI*.3;
    sub.forEach((s,j)=>{const ang=sub.length===1?a:sa+ss*j;const sr=r+80+Math.sin(ang*3)*15;nodes.push({...s,x:Math.cos(ang)*sr,y:Math.sin(ang)*sr,depth:2,vx:0,vy:0});edges.push({from:c.id,to:s.id});
      (s.network||[]).forEach((s2,k)=>{const s2a=ang+(k-.5)*.4;const s2r=sr+60;nodes.push({...s2,x:Math.cos(s2a)*s2r,y:Math.sin(s2a)*s2r,depth:3,vx:0,vy:0});edges.push({from:s.id,to:s2.id})})})});
  const nm={};nodes.forEach(n=>nm[n.id]=n);
  for(let it=0;it<30;it++){for(let i=0;i<nodes.length;i++){if(nodes[i].fixed)continue;for(let j=i+1;j<nodes.length;j++){if(nodes[j].fixed)continue;const dx=nodes[j].x-nodes[i].x,dy=nodes[j].y-nodes[i].y;let d=Math.sqrt(dx*dx+dy*dy)||1;if(d<40){const f=800/(d*d);nodes[i].vx-=dx/d*f;nodes[i].vy-=dy/d*f;nodes[j].vx+=dx/d*f;nodes[j].vy+=dy/d*f}}};edges.forEach(e=>{const a=nm[e.from],b=nm[e.to];if(!a||!b)return;const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;const ideal=a.depth===0?130:b.depth===3?50:75;const f=(d-ideal)*.02;if(!a.fixed){a.vx+=dx/d*f;a.vy+=dy/d*f}if(!b.fixed){b.vx-=dx/d*f;b.vy-=dy/d*f}});nodes.forEach(n=>{if(n.fixed)return;n.x+=n.vx;n.y+=n.vy;n.vx*=.8;n.vy*=.8})}
  return{nodes,edges};
}
function layoutOther(person){
  const net=person.network||[];const nodes=[{...person,x:0,y:0,depth:0,isCenter:true}];const edges=[];
  const cnt=net.length;const step=cnt>0?(Math.PI*2)/cnt:0;
  net.forEach((n,i)=>{const a=step*i-Math.PI/2;const r=110+Math.sin(a*5+i)*16;nodes.push({...n,x:Math.cos(a)*r,y:Math.sin(a)*r,depth:1,isCenter:false});edges.push({from:person.id,to:n.id});
    (n.network||[]).forEach((s,j)=>{const sa=a+(j-.5)*.5;const sr=r+70;nodes.push({...s,x:Math.cos(sa)*sr,y:Math.sin(sa)*sr,depth:2,isCenter:false});edges.push({from:n.id,to:s.id})})});
  return{nodes,edges};
}

function setupSvg(nodes,edges,nm){
  const svg=$('#svg');if(!svg)return;
  svg.addEventListener('wheel',e=>{e.preventDefault();const s=e.deltaY>0?1.08:.92;const v=S.vb;const nw=v.w*s,nh=v.h*s;S.vb={x:v.x-(nw-v.w)/2,y:v.y-(nh-v.h)/2,w:nw,h:nh};svg.setAttribute('viewBox',`${S.vb.x} ${S.vb.y} ${S.vb.w} ${S.vb.h}`)},{passive:false});
  svg.addEventListener('mousedown',e=>{if(e.target.closest('[data-node]'))return;S.pan=true;S.ps={x:e.clientX,y:e.clientY};svg.style.cursor='grabbing'});
  window.addEventListener('mousemove',e=>{if(!S.pan)return;const r=svg.getBoundingClientRect();S.vb.x-=(e.clientX-S.ps.x)*(S.vb.w/r.width);S.vb.y-=(e.clientY-S.ps.y)*(S.vb.h/r.height);S.ps={x:e.clientX,y:e.clientY};svg.setAttribute('viewBox',`${S.vb.x} ${S.vb.y} ${S.vb.w} ${S.vb.h}`)});
  window.addEventListener('mouseup',()=>{S.pan=false;if(svg)svg.style.cursor='grab'});
  svg.querySelectorAll('[data-node]').forEach(g=>{const id=g.dataset.node;g.addEventListener('mouseenter',()=>{S.hovered=id;render()});g.addEventListener('mouseleave',()=>{S.hovered=null;render()});g.addEventListener('click',()=>{const n=nodes.find(x=>x.id===id);if(n?.isSelf)showCard(S.profile,true);else if(n)showCard(n,false)})});
}

function uRow(u,i,cIds){const a=cIds.has(u.id);return`<div class="user-row" style="animation-delay:${i*.05}s">${av(u,40)}<div class="info"><p class="name">${u.name}</p><p class="meta">${u.role} · ${u.company}</p></div><button class="btn ${a?'btn-s':'btn-p'}" style="padding:7px 14px;font-size:9px;min-width:78px" onclick="${a?'':`addC('${u.id}')`}" ${a?'disabled':''}>${a?IC.check+' Added':'+ Connect'}</button></div>`}
function doSearch(q){const cIds=new Set(S.connections.map(c=>c.id));const res=$('#sr'),sg=$('#sg');if(!res)return;if(!q.trim()){res.innerHTML='';if(sg)sg.classList.remove('hidden');return}if(sg)sg.classList.add('hidden');const m=DB.filter(u=>!cIds.has(u.id)&&(u.name.toLowerCase().includes(q.toLowerCase())||u.role.toLowerCase().includes(q.toLowerCase())||u.company.toLowerCase().includes(q.toLowerCase())));res.innerHTML=m.length?m.map((u,i)=>uRow(u,i,cIds)).join(''):`<p style="text-align:center;padding:36px 0;color:var(--text3);font-size:12px">No results</p>`}
function addC(id){const u=DB.find(x=>x.id===id);if(!u||S.connections.find(c=>c.id===id))return;S.connections.push({...u});S.activity.unshift({text:`<strong>You</strong> connected with <strong>${u.name}</strong>`,time:'Just now',color:C.accent});toast(`Connected with ${u.name}`);render()}
function doScan(){const cIds=new Set(S.connections.map(c=>c.id));const av2=DB.filter(u=>!cIds.has(u.id));if(!av2.length)return;setTimeout(()=>{const u=av2[Math.floor(Math.random()*av2.length)];const o=$('#scanO');if(!o)return;o.classList.remove('hidden');o.innerHTML=`<span style="color:${C.accent};margin-bottom:10px">${IC.check}</span>${av(u,48)}<p style="font-size:13px;font-weight:500;margin:8px 0 2px">${u.name}</p><p style="color:var(--text3);font-size:10px">${u.role} @ ${u.company}</p>`;$('#scanA').innerHTML=`<div style="display:flex;gap:10px"><button class="btn btn-s" style="flex:1" onclick="renderPanel()">Rescan</button><button class="btn btn-p" style="flex:1" onclick="addC('${u.id}')">Connect</button></div>`},1400)}

function openView(id){const u=DB.find(x=>x.id===id);if(!u)return;S.viewNet=u;S.selected=null;$('#cardSlot').innerHTML='';renderView()}
function renderView(){const slot=$('#viewSlot');if(!slot||!S.viewNet){if(slot)slot.innerHTML='';return};const person=S.viewNet;const{nodes,edges}=layoutOther(person);const nm={};nodes.forEach(n=>nm[n.id]=n);const myIds=new Set(S.connections.map(c=>c.id));const fn=flatNet(person);
  let svg=`<defs><radialGradient id="vg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="rgba(90,172,240,.08)"/><stop offset="100%" stop-color="transparent"/></radialGradient></defs><circle cx="0" cy="0" r="250" fill="url(#vg)" opacity=".5"/>`;
  edges.forEach(e=>{const a=nm[e.from],b=nm[e.to];if(!a||!b)return;svg+=`<path d="${cPath(a.x,a.y,b.x,b.y)}" fill="none" stroke="${C.line}" stroke-width="1" opacity=".35"/>`});
  nodes.forEach(n=>{const isC=n.isCenter;const sz=isC?11:n.depth===2?4:6;const isMine=myIds.has(n.id);const col=isC?C.career:isMine?C.accent:C.nodeDefault;svg+=`<g data-vn="${n.id}" style="cursor:${isC?'default':'pointer'}">`;if(isC)svg+=`<circle cx="${n.x}" cy="${n.y}" r="${sz+7}" fill="${col}" opacity=".1"><animate attributeName="r" values="${sz+5};${sz+10};${sz+5}" dur="3s" repeatCount="indefinite"/></circle>`;svg+=`<circle cx="${n.x}" cy="${n.y}" r="${sz}" fill="${col}"/>`;if(isMine&&!isC)svg+=`<circle cx="${n.x+sz-1}" cy="${n.y-sz+1}" r="3.5" fill="${C.accent}" stroke="${C.bg}" stroke-width="1.5"/>`;svg+=`</g>`});
  slot.innerHTML=`<div class="screen" style="z-index:1500;background:var(--bg);animation:fadeIn .3s ease"><div style="position:absolute;top:0;left:0;right:0;padding:18px 22px;display:flex;align-items:center;gap:14px;z-index:10"><button onclick="closeView()" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:4px">${IC.back}</button>${av(person,34)}<div><p style="font-size:13px;font-weight:500">${person.name}'s Network</p><p style="color:var(--text3);font-size:9px;letter-spacing:1.5px;text-transform:uppercase">${fn.length} connections · tap to explore</p></div></div><div style="position:absolute;top:72px;left:50%;transform:translateX(-50%);z-index:10;background:${C.intro}0d;border:1px solid ${C.intro}1a;border-radius:50px;padding:6px 18px;display:flex;align-items:center;gap:6px"><span style="color:${C.intro}">${IC.intro}</span><span style="color:${C.intro};font-size:9px;letter-spacing:1px;text-transform:uppercase">Tap to request an introduction</span></div><svg viewBox="-250 -250 500 500" style="width:100%;height:100%">${svg}</svg><div style="position:absolute;bottom:22px;left:22px;display:flex;gap:14px;color:var(--text3);font-size:9px;letter-spacing:1px"><span style="display:flex;align-items:center;gap:5px"><span style="width:7px;height:7px;border-radius:50%;background:${C.accent};display:inline-block"></span>In your network</span><span style="display:flex;align-items:center;gap:5px"><span style="width:7px;height:7px;border-radius:50%;background:${C.nodeDefault};display:inline-block"></span>New person</span></div><div id="vnC"></div></div>`;
  slot.querySelectorAll('[data-vn]').forEach(g=>{const id=g.dataset.vn;const node=nodes.find(x=>x.id===id);if(!node||node.isCenter)return;g.addEventListener('click',()=>{const c=$('#vnC');const isMine=myIds.has(node.id);c.innerHTML=`<div class="card" style="position:absolute;bottom:22px;right:22px;width:290px;z-index:100"><button class="close" onclick="$('#vnC').innerHTML=''">${IC.close}</button><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">${av(node,44,isMine)}<div><p style="font-size:14px;font-weight:500;margin:0 0 2px">${node.name}</p><p style="color:${C.career};font-size:11px">${node.role} @ ${node.company}</p></div></div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px">${node.location?`<span class="tag tag-location">${node.location}</span>`:''}${node.education?`<span class="tag tag-education">${node.education}</span>`:''}</div>${isMine?`<div style="display:flex;align-items:center;gap:6px;padding:8px 12px;background:${C.accent}0a;border-radius:8px;border:1px solid ${C.accent}18"><span style="color:${C.accent}">${IC.check}</span><span style="color:${C.accent};font-size:10px">In your network</span></div>`:`<button class="btn btn-i" style="width:100%" onclick="openIntro('${node.id}','${person.id}')">${IC.intro} Ask ${person.name.split(' ')[0]} to Introduce</button>`}</div>`})});
}
function closeView(){S.viewNet=null;$('#viewSlot').innerHTML=''}

function openIntro(tid,mid){const person=S.viewNet;if(!person)return;const all=[...(person.network||[])];(person.network||[]).forEach(n=>(n.network||[]).forEach(s=>all.push(s)));const t=all.find(n=>n.id===tid);if(!t)return;S.introTarget=t;S.introMutual=person;renderIntroM()}
function renderIntroM(){const slot=$('#introSlot')||document.body;const t=S.introTarget,m=S.introMutual;if(!t||!m){slot.innerHTML='';return};const msg=`Hi ${m.name}, could you introduce me to ${t.name}? I'd love to connect about their work at ${t.company}.`;
  slot.innerHTML=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px)" onclick="closeIntro()"><div id="iC" onclick="event.stopPropagation()" style="background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;width:390px;animation:pop .4s ease"><h3 style="color:${C.intro};font-size:11px;letter-spacing:2px;text-transform:uppercase;margin:0 0 22px;display:flex;align-items:center;gap:7px">${IC.intro} Request Introduction</h3><div style="display:flex;align-items:center;justify-content:center;margin:0 0 24px;padding:18px 10px;background:var(--bg);border-radius:10px"><div style="text-align:center">${av(S.profile,36,true)}<p style="color:${C.accent};font-size:7px;margin-top:5px;letter-spacing:1.5px;text-transform:uppercase">You</p></div><div style="flex:1;max-width:44px;height:2px;background:linear-gradient(90deg,${C.accent},${C.intro});margin:0 4px;margin-bottom:16px"></div><div style="text-align:center">${av(m,36)}<p style="color:${C.intro};font-size:7px;margin-top:5px;letter-spacing:1.5px;text-transform:uppercase">${m.name.split(' ')[0]}</p></div><div style="flex:1;max-width:44px;height:0;border-top:2px dashed ${C.intro}44;margin:0 4px;margin-bottom:16px"></div><div style="text-align:center">${av(t,36)}<p style="color:var(--text3);font-size:7px;margin-top:5px;letter-spacing:1.5px;text-transform:uppercase">${t.name.split(' ')[0]}</p></div></div><div style="background:${C.intro}08;border:1px solid ${C.intro}18;border-radius:8px;padding:10px 12px;margin-bottom:18px;display:flex;gap:8px"><span style="color:${C.intro};font-size:13px">↗</span><p style="color:var(--text2);font-size:10px;line-height:1.5;margin:0"><strong style="color:var(--text)">${m.name}</strong> knows <strong style="color:var(--text)">${t.name}</strong></p></div><div class="field"><label class="nx-label">Your message</label><textarea id="iMsg" class="nx-input">${msg}</textarea></div><div style="display:flex;gap:10px"><button class="btn btn-s" style="flex:1" onclick="closeIntro()">Cancel</button><button class="btn btn-i" style="flex:1" onclick="sendIntro()">${IC.send} Send</button></div></div></div>`}
function sendIntro(){const t=S.introTarget,m=S.introMutual;const el=$('#iC');if(!el)return;S.activity.unshift({text:`<strong>You</strong> requested an intro to <strong>${t.name}</strong> via <strong>${m.name}</strong>`,time:'Just now',color:C.intro});el.outerHTML=`<div style="text-align:center;animation:pop .5s ease"><div style="width:72px;height:72px;border-radius:50%;background:${C.accent}18;border:2px solid ${C.accent};display:flex;align-items:center;justify-content:center;margin:0 auto 20px">${IC.checkLg}</div><h3 style="font-size:16px;margin:0 0 6px">Request Sent!</h3><p style="color:var(--text3);font-size:11px;max-width:260px;line-height:1.5;margin:0 auto">${m.name} will receive your request</p><button class="btn btn-s" style="margin:20px auto 0" onclick="closeIntro()">Done</button></div>`}
function closeIntro(){S.introTarget=null;S.introMutual=null;const s=$('#introSlot');if(s)s.innerHTML=''}

function renderNotif(){const slot=$('#notifSlot');if(!slot)return;slot.innerHTML=`<div class="overlay" onclick="$('#notifSlot').innerHTML=''"><div class="panel" onclick="event.stopPropagation()"><div class="panel-head"><h2 style="font-family:var(--serif);font-size:20px">Notifications</h2><button style="background:none;border:none;color:var(--text3);cursor:pointer" onclick="$('#notifSlot').innerHTML=''">${IC.close}</button></div><div class="panel-body">${S.notifications.map((n,i)=>{if(n.type==='intro_request')return`<div class="user-row" style="animation-delay:${i*.06}s;${n.read?'':'background:'+C.accent+'06;margin:0 -22px;padding:12px 22px;border-radius:8px'}">${av(n.from,40)}<div class="info"><p class="name">${n.from.name} wants an intro</p><p class="meta">${n.message}</p><p style="color:var(--text3);font-size:9px;margin-top:3px">${n.time}</p></div><button class="btn btn-p" style="padding:6px 12px;font-size:9px" onclick="S.notifications[${i}].read=true;toast('Intro accepted!');renderNotif();render()">Accept</button></div>`;return`<div class="user-row" style="animation-delay:${i*.06}s">${av(n.from,40)}<div class="info"><p class="name">${n.from.name} connected with you</p><p style="color:var(--text3);font-size:9px;margin-top:3px">${n.time}</p></div></div>`}).join('')}</div></div></div>`;S.notifications.forEach(n=>n.read=true)}

function renderAct(){const slot=$('#actSlot');if(!slot)return;slot.innerHTML=`<div class="overlay" onclick="$('#actSlot').innerHTML=''"><div class="panel" onclick="event.stopPropagation()"><div class="panel-head"><h2 style="font-family:var(--serif);font-size:20px">Activity</h2><button style="background:none;border:none;color:var(--text3);cursor:pointer" onclick="$('#actSlot').innerHTML=''">${IC.close}</button></div><div class="panel-body">${S.activity.map((a,i)=>`<div class="activity-item" style="animation-delay:${i*.05}s"><div class="dot-line"><div class="a-dot" style="background:${a.color}"></div>${i<S.activity.length-1?'<div class="a-line"></div>':''}</div><div><p class="a-text">${a.text}</p><p class="a-time">${a.time}</p></div></div>`).join('')}</div></div></div>`}

render();
</script>
</body>
</html>
