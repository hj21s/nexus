<style>
:root {
  --bg: #0a0a0f; --surface: #13131a; --border: #2a2a3a; --accent: #c8f560;
  --accent-glow: rgba(200,245,96,0.12); --text: #e8e8f0; --text-mid: #a0a0b4;
  --text-dim: #5a5a6e; --line: #3a3a50; --node-default: #5a5a70;
  --career: #60b5f5; --location: #f5a060; --education: #c860f5; --intro: #f5d060;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); font-family:'Space Mono',monospace; color:var(--text); overflow:hidden; height:100vh; }
::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
@keyframes slideIn { from{transform:translateX(100%)} to{transform:translateX(0)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes scanLine { 0%{top:15%} 100%{top:85%} }
@keyframes successPop { 0%{transform:scale(.8);opacity:0} 50%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

.screen { position:absolute; inset:0; }
.hidden { display:none!important; }

/* ─── Inputs / Buttons ─── */
.nx-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:13px 16px; color:var(--text); font-size:14px; font-family:'Space Mono',monospace; outline:none; transition:border-color .3s; }
.nx-input:focus { border-color:var(--accent); }
.nx-input::placeholder { color:var(--text-dim); }
textarea.nx-input { resize:vertical; }
.nx-label { color:var(--text-dim); font-size:10px; letter-spacing:2px; text-transform:uppercase; display:block; margin-bottom:8px; }
.nx-btn { border:none; border-radius:50px; padding:12px 24px; font-family:'Space Mono',monospace; font-size:12px; cursor:pointer; letter-spacing:1px; display:inline-flex; align-items:center; justify-content:center; gap:8px; transition:all .2s; }
.nx-btn:hover { transform:scale(1.03); }
.nx-btn:disabled { opacity:.4; cursor:default; transform:none; }
.nx-btn-primary { background:var(--accent); color:var(--bg); font-weight:700; }
.nx-btn-secondary { background:transparent; color:var(--text-mid); border:1px solid var(--border); }
.nx-btn-ghost { background:transparent; color:var(--text-dim); }
.nx-btn-intro { background:var(--intro); color:var(--bg); font-weight:700; }

.avatar { border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-family:'Space Mono',monospace; flex-shrink:0; }
.logo { font-family:'Instrument Serif',serif; color:var(--text); }
.logo span { color:var(--accent); }

/* ─── Overlays ─── */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:1000; backdrop-filter:blur(12px); display:flex; }
.panel { width:420px; height:100%; background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; animation:slideIn .35s ease; margin-left:auto; }
.panel-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.panel-tabs { display:flex; border-bottom:1px solid var(--border); }
.panel-tab { flex:1; padding:14px 0; display:flex; flex-direction:column; align-items:center; gap:6px; background:none; border:none; cursor:pointer; color:var(--text-dim); border-bottom:2px solid transparent; transition:all .3s; font-family:'Space Mono',monospace; }
.panel-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.panel-tab.active-intro { color:var(--intro); border-bottom-color:var(--intro); }
.panel-tab span { font-size:8px; letter-spacing:1.5px; text-transform:uppercase; }
.panel-content { flex:1; overflow-y:auto; padding:24px; }

.user-row { display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid rgba(42,42,58,.13); animation:fadeUp .3s ease both; }
.user-info { flex:1; min-width:0; }
.user-info p:first-child { color:var(--text); font-size:13px; font-weight:600; margin-bottom:2px; }
.user-info p:last-child { color:var(--text-dim); font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.connect-btn { background:var(--accent); color:var(--bg); border:none; border-radius:50px; padding:8px 16px; font-family:'Space Mono',monospace; font-size:10px; font-weight:700; cursor:pointer; letter-spacing:1px; text-transform:uppercase; min-width:85px; }
.connect-btn.added { background:transparent; color:var(--accent); border:1px solid rgba(200,245,96,.27); cursor:default; }
.connect-btn.pending { background:rgba(200,245,96,.2); color:var(--accent); cursor:default; }
.view-net-btn { display:flex; align-items:center; gap:6px; background:rgba(245,208,96,.09); color:var(--intro); border:1px solid rgba(245,208,96,.19); border-radius:50px; padding:8px 14px; font-family:'Space Mono',monospace; font-size:10px; font-weight:600; cursor:pointer; transition:background .3s; }
.view-net-btn:hover { background:rgba(245,208,96,.16); }

.profile-card { position:absolute; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; width:300px; z-index:100; animation:fadeUp .3s ease; box-shadow:0 20px 60px rgba(0,0,0,.5); }
.profile-card .close-btn { position:absolute; top:12px; right:16px; cursor:pointer; color:var(--text-dim); background:none; border:none; }
.detail-row { display:flex; gap:8px; margin-bottom:6px; }
.detail-label { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; min-width:70px; }
.detail-value { color:var(--text-dim); font-size:12px; }

/* Bottom nav */
.bottom-nav { position:absolute; bottom:0; left:50%; transform:translateX(-50%); display:flex; background:var(--surface); border-radius:20px 20px 0 0; border:1px solid var(--border); border-bottom:none; z-index:10; }
.nav-btn { display:flex; flex-direction:column; align-items:center; gap:4px; padding:14px 22px; background:none; border:none; color:var(--text-dim); cursor:pointer; font-family:'Space Mono',monospace; transition:color .3s; }
.nav-btn:hover { color:var(--accent); }
.nav-btn span { font-size:8px; letter-spacing:1.5px; text-transform:uppercase; }

/* Filter pills */
.filter-bar { position:absolute; top:80px; left:50%; transform:translateX(-50%); z-index:10; display:flex; gap:4px; background:var(--surface); padding:4px; border-radius:50px; border:1px solid var(--border); }
.filter-pill { background:transparent; color:var(--text-dim); border:none; border-radius:50px; padding:6px 14px; font-family:'Space Mono',monospace; font-size:10px; font-weight:600; cursor:pointer; letter-spacing:1px; text-transform:uppercase; transition:all .3s; }
.filter-pill.active { color:var(--bg); }
</style>
</head>

function avatar(initials, size=48, color=C.accent, ring=false) {
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${color}22;border:2px solid ${ring?color:color+'44'};font-size:${size*.35}px;color:${color};${ring?`box-shadow:0 0 16px ${color}33`:''}">${initials}</div>`;
}

function generateQR(text, size=180) {
  const gs=21; const grid=Array.from({length:gs},()=>Array(gs).fill(false));
  const df=(r,c)=>{for(let i=0;i<7;i++)for(let j=0;j<7;j++){if(i===0||i===6||j===0||j===6||(i>=2&&i<=4&&j>=2&&j<=4))if(r+i<gs&&c+j<gs)grid[r+i][c+j]=true}};
  df(0,0);df(0,14);df(14,0);
  let hash=0;for(let i=0;i<text.length;i++)hash=((hash<<5)-hash+text.charCodeAt(i))|0;
  for(let r=0;r<gs;r++)for(let c=0;c<gs;c++){if(!grid[r][c]){const v=Math.sin(hash*(r*gs+c+1)*.01)*10000;grid[r][c]=v-Math.floor(v)>.45}}
  const cs=size/21;
  let svg=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" fill="${C.bg}" rx="8"/>`;
  grid.forEach((row,r)=>row.forEach((cell,c)=>{if(cell)svg+=`<rect x="${c*cs+.5}" y="${r*cs+.5}" width="${cs-1}" height="${cs-1}" rx="1" fill="${C.accent}"/>`}));
  return svg+'</svg>';
}

/* ─── CURVED EDGE ─── */
function curvedPath(x1,y1,x2,y2) {
  const dx=x2-x1,dy=y2-y1,dist=Math.sqrt(dx*dx+dy*dy);
  const curv=dist*.35,nx=-dy/dist,ny=dx/dist;
  const side=Math.sin(x1*3+y1*5)>0?1:-1;
  const cpx=(x1+x2)/2+nx*curv*side, cpy=(y1+y2)/2+ny*curv*side;
  return `M ${x1} ${y1} Q ${cpx} ${cpy} ${x2} ${y2}`;
}

/* ─── LAYOUT ─── */
function layoutNetwork(conns) {
  const nodes=[{id:'you',x:0,y:0,depth:0,isSelf:true,name:state.profile?.name||'You'}];
  const edges=[];
  const count=conns.length; if(!count) return {nodes,edges};
  const step=(Math.PI*2)/count;
  conns.forEach((c,i)=>{
    const angle=step*i-Math.PI/2;
    const r=140+Math.sin(angle*5+i)*20;
    nodes.push({...c,x:Math.cos(angle)*r,y:Math.sin(angle)*r,depth:1});
    edges.push({from:'you',to:c.id});
  });
  return {nodes,edges};
}

function layoutOtherNetwork(person) {
  const network=person.network||[];
  const nodes=[{...person,x:0,y:0,depth:0,isCenter:true}];
  const edges=[];
  const count=network.length;
  const step=count>0?(Math.PI*2)/count:0;
  network.forEach((n,i)=>{
    const angle=step*i-Math.PI/2;
    const r=120+Math.sin(angle*5+i)*18;
    nodes.push({...n,x:Math.cos(angle)*r,y:Math.sin(angle)*r,depth:1,isCenter:false});
    edges.push({from:person.id,to:n.id});
  });
  return {nodes,edges};
}

          <input class="nx-input" value="${d[f.key]}" placeholder="${f.ph}" oninput="state.onboardData.${f.key}=this.value;updateOnboardBtns()">
        </div>
      `).join('')}
      <div style="display:flex;gap:12px;margin-top:8px">
        ${s>0?'<button class="nx-btn nx-btn-secondary" onclick="state.onboardStep--;render()">Back</button>':''}
        <button id="onboardNext" class="nx-btn nx-btn-primary" style="flex:1" ${valid?'':'disabled'} onclick="state.onboardStep++;render()">
          ${s===steps.length-1?'Review Profile':'Continue'}
        </button>
      </div>
    </div>
  </div>`;
}

function updateOnboardBtns() {
  const btn = $('#onboardNext');
  if (!btn) return;
  const steps = [[['name']],[['role']],[['location']],[['education']]];
  const cur = steps[state.onboardStep];
  if (!cur) return;
  btn.disabled = !cur[0].every(k => state.onboardData[k].trim().length > 0);
}

function launchNetwork() {
  const d = state.onboardData;
  const initials = d.name.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  state.profile = { id:'you', name:d.name, role:d.role, company:d.company, location:d.location, education:d.education, isSelf:true, avatar:initials };
  state.currentScreen = 'network';
  render();
}

/* ─── MAIN NETWORK SCREEN ─── */
function renderNetwork(root) {
  const p = state.profile;
  const {nodes,edges} = layoutNetwork(state.connections);
  const nodeMap = {}; nodes.forEach(n=>nodeMap[n.id]=n);
  const vb = state.viewBox;

  const connIds = state.hoveredNode ? getConnectedIds(state.hoveredNode, edges) : null;

  let svgContent = `
    <defs><radialGradient id="bgGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="${C.accentGlow}"/><stop offset="100%" stop-color="transparent"/></radialGradient></defs>
    <circle cx="0" cy="0" r="300" fill="url(#bgGlow)" opacity="0.5"/>
  `;

  edges.forEach(e => {
    const from=nodeMap[e.from],to=nodeMap[e.to]; if(!from||!to) return;
    const hl = connIds && connIds.has(e.from) && connIds.has(e.to);
    const dimmed = connIds && !hl;
    svgContent += `<path d="${curvedPath(from.x,from.y,to.x,to.y)}" fill="none" stroke="${hl?C.lineActive:C.line}" stroke-width="${hl?2.5:1.2}" opacity="${dimmed?.1:hl?1:.45}" style="transition:all .4s"/>`;
  });

  nodes.forEach(node => {
    const isSelf=node.isSelf; const size=isSelf?14:8;
    let color=C.nodeDefault;
    if(isSelf) color=C.nodeSelf;
    else if(state.filter==='career') color=C.career;
    else if(state.filter==='location') color=C.location;
    else if(state.filter==='education') color=C.education;
    else if(connIds?.has(node.id)) color=C.accent;
    const isHovered=state.hoveredNode===node.id;
    const isDimmed=connIds?!connIds.has(node.id):false;

    svgContent += `<g data-node="${node.id}" style="cursor:pointer" opacity="${isDimmed?.15:1}">`;
    if(isSelf||isHovered) svgContent+=`<circle cx="${node.x}" cy="${node.y}" r="${size+8}" fill="${color}" opacity="0.15"><animate attributeName="r" values="${size+6};${size+12};${size+6}" dur="3s" repeatCount="indefinite"/></circle>`;
    svgContent += `<circle cx="${node.x}" cy="${node.y}" r="${isHovered?size+3:size}" fill="${color}" style="transition:all .3s"/>`;
    if(isHovered) svgContent+=`<text x="${node.x}" y="${node.y-size-10}" text-anchor="middle" fill="${C.text}" font-size="11" font-family="'Space Mono',monospace" font-weight="600">${node.name}</text>`;
    svgContent += `</g>`;
  });

  const filters = [{key:'all',label:'All',color:C.accent},{key:'career',label:'Career',color:C.career},{key:'location',label:'Location',color:C.location},{key:'education',label:'Education',color:C.education}];

  root.innerHTML = `
  <div class="screen" id="networkScreen" style="user-select:none">
    <div style="position:absolute;top:0;left:0;right:0;padding:20px 28px;display:flex;justify-content:space-between;align-items:center;z-index:10">
      <div>
        <h1 class="logo" style="font-size:26px;margin:0">nexus<span>.</span></h1>
        <p style="color:${C.textDim};font-size:10px;margin:4px 0 0;letter-spacing:2px;text-transform:uppercase">${state.connections.length} connection${state.connections.length!==1?'s':''}</p>
      </div>
      <div onclick="showProfileCard(state.profile,true)" style="cursor:pointer">${avatar(p.avatar,36,C.accent,true)}</div>
    </div>

    <div class="filter-bar">
      ${filters.map(f=>`<button class="filter-pill ${state.filter===f.key?'active':''}" style="${state.filter===f.key?`background:${f.color}`:''}" onclick="state.filter='${f.key}';render()">${f.label}</button>`).join('')}
    </div>

    ${state.connections.length===0?`
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:5;animation:fadeUp .6s ease">
      <div style="width:80px;height:80px;border-radius:50%;background:${C.accent}15;border:2px solid ${C.accent}33;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;color:${C.accent}">${ICONS.network}</div>
      <h2 style="font-family:'Instrument Serif',serif;font-size:24px;margin:0 0 8px">Your network starts here</h2>
      <p style="color:${C.textDim};font-size:12px;margin:0 0 24px;max-width:280px">Add your first connection to watch your map grow</p>
      <button class="nx-btn nx-btn-primary" onclick="openConnect('search')">+ Add Your First Connection</button>
    </div>`:''}

    <svg id="networkSvg" viewBox="${vb.x} ${vb.y} ${vb.w} ${vb.h}" style="width:100%;height:100%;cursor:grab">${svgContent}</svg>

    <div class="bottom-nav">
      <button class="nav-btn" onclick="state.showConnect=false;render()"><span style="color:${C.accent}">${ICONS.network}</span><span>Network</span></button>
      <button class="nav-btn" onclick="openConnect('search')"><span style="color:${C.accent}">${ICONS.connect}</span><span>Connect</span></button>
      <button class="nav-btn" onclick="openConnect('intros')"><span style="color:${C.intro}">${ICONS.intro}</span><span>Intros</span></button>
      <button class="nav-btn" onclick="showProfileCard(state.profile,true)"><span style="color:${C.accent}">${ICONS.profile}</span><span>Profile</span></button>
    </div>

    ${state.connections.length>0?`<div style="position:absolute;bottom:70px;right:24px;color:${C.textDim};font-size:9px;letter-spacing:1px;text-transform:uppercase;z-index:5">scroll to zoom · drag to pan</div>`:''}

    <div id="profileCardSlot"></div>
    <div id="connectPanelSlot"></div>
    <div id="viewNetworkSlot"></div>
    <div id="introModalSlot"></div>
  </div>`;

  setupSvgInteractions(nodes, edges, nodeMap);
  if (state.selectedNode) renderProfileCard();
  if (state.showConnect) renderConnectPanel();
  if (state.viewingNetwork) renderViewNetwork();
  if (state.introTarget) renderIntroModal();
}

function getConnectedIds(id, edges) {
  const ids=new Set([id]);
  edges.forEach(e=>{if(e.from===id)ids.add(e.to);if(e.to===id)ids.add(e.from)});
  return ids;
}

function setupSvgInteractions(nodes, edges, nodeMap) {
  const svg = $('#networkSvg');
  if (!svg) return;

  svg.addEventListener('wheel', e => {
    e.preventDefault();
    const scale = e.deltaY > 0 ? 1.1 : 0.9;
    const vb = state.viewBox;
    const nw=vb.w*scale, nh=vb.h*scale;
    state.viewBox = {x:vb.x-(nw-vb.w)/2, y:vb.y-(nh-vb.h)/2, w:nw, h:nh};
    svg.setAttribute('viewBox',`${state.viewBox.x} ${state.viewBox.y} ${state.viewBox.w} ${state.viewBox.h}`);
  }, {passive:false});

  svg.addEventListener('mousedown', e => {
    if (e.target.closest('[data-node]')) return;
    state.isPanning=true; state.panStart={x:e.clientX,y:e.clientY}; svg.style.cursor='grabbing';
  });
  window.addEventListener('mousemove', e => {
    if (!state.isPanning) return;
    const rect=svg.getBoundingClientRect();
    const vb=state.viewBox;
    vb.x -= (e.clientX-state.panStart.x)*(vb.w/rect.width);
    vb.y -= (e.clientY-state.panStart.y)*(vb.h/rect.height);
    state.panStart={x:e.clientX,y:e.clientY};
    svg.setAttribute('viewBox',`${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  });
  window.addEventListener('mouseup', ()=>{ state.isPanning=false; if(svg) svg.style.cursor='grab'; });

  svg.querySelectorAll('[data-node]').forEach(g => {
    const id = g.dataset.node;
    g.addEventListener('mouseenter', () => { state.hoveredNode=id; render(); });
    g.addEventListener('mouseleave', () => { state.hoveredNode=null; render(); });
    g.addEventListener('click', () => {
      const node = nodes.find(n=>n.id===id);
      if (node?.isSelf) showProfileCard(state.profile, true);
      else if (node) showProfileCard(node, false);
    });
  });
}

function showProfileCard(node, isSelf) {
  state.selectedNode = {...node, isSelf};
  renderProfileCard();
}

function renderProfileCard() {
  const slot = $('#profileCardSlot');
  if (!slot || !state.selectedNode) { if(slot) slot.innerHTML=''; return; }
  const n = state.selectedNode;
  const initials = n.avatar || n.name?.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) || '?';
  const dbUser = USERS_DB.find(u=>u.id===n.id);
  const netCount = dbUser?.network?.length||0;

  slot.innerHTML = `
  <div class="profile-card" style="bottom:80px;left:24px">
    <button class="close-btn" onclick="state.selectedNode=null;$('#profileCardSlot').innerHTML=''">${ICONS.close}</button>
    ${avatar(initials,44,n.isSelf?C.accent:C.career,n.isSelf)}
    <div style="margin-top:14px">
      <p style="font-size:16px;font-weight:700;margin:0 0 2px">${n.name}</p>
      <p style="color:${C.accent};font-size:12px;margin:0 0 16px">${n.role} ${n.company?'@ '+n.company:''}</p>
    </div>
    ${n.location?`<div class="detail-row"><span class="detail-label" style="color:${C.location}">Location</span><span class="detail-value">${n.location}</span></div>`:''}
    ${n.education?`<div class="detail-row" style="margin-bottom:16px"><span class="detail-label" style="color:${C.education}">Education</span><span class="detail-value">${n.education}</span></div>`:''}
    ${!n.isSelf && netCount>0 ? `<button class="nx-btn nx-btn-secondary" style="width:100%" onclick="state.selectedNode=null;openViewNetwork('${n.id}')">${ICONS.eye} View ${n.name.split(' ')[0]}'s Network (${netCount})</button>`:''}
  </div>`;
}

/* ─── CONNECT PANEL ─── */

  state.connectTab=tab||'search'; state.showConnect=true;
  if (state.currentScreen==='network') renderConnectPanel();
  else render();
}

          <div style="position:absolute;top:20px;left:20px;width:40px;height:40px;border-top:3px solid ${C.accent};border-left:3px solid ${C.accent};border-radius:4px"></div>
          <div style="position:absolute;top:20px;right:20px;width:40px;height:40px;border-top:3px solid ${C.accent};border-right:3px solid ${C.accent};border-radius:4px"></div>
          <div style="position:absolute;bottom:20px;left:20px;width:40px;height:40px;border-bottom:3px solid ${C.accent};border-left:3px solid ${C.accent};border-radius:4px"></div>
          <div style="position:absolute;bottom:20px;right:20px;width:40px;height:40px;border-bottom:3px solid ${C.accent};border-right:3px solid ${C.accent};border-radius:4px"></div>
          <div style="position:absolute;left:24px;right:24px;height:2px;background:linear-gradient(90deg,transparent,${C.accent},transparent);animation:scanLine 2s ease-in-out infinite alternate;box-shadow:0 0 20px ${C.accent}66"></div>
          <div id="scanResultOverlay" class="hidden" style="position:absolute;inset:0;background:${C.bg}ee;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeUp .4s ease"></div>

  } else if (tab==='myqr') {
    const p=state.profile;
    content = `
      <div style="text-align:center">
        <p style="color:${C.textDim};font-size:12px;margin-bottom:28px">Share your code</p>
        <div style="background:${C.bg};border-radius:20px;padding:32px;display:inline-block;border:1px solid ${C.border}">${generateQR('nexus:'+p.name)}</div>

      ${state.connections.length===0?`
        <div style="text-align:center;padding:40px 0">
          <div style="color:${C.textDim};opacity:.4">${ICONS.intro}</div>
          <p style="color:${C.textDim};font-size:13px;margin-top:12px">No connections yet</p>

function closeConnect() { state.showConnect=false; $('#connectPanelSlot').innerHTML=''; }

function userRowHTML(u, i, connIds) {
  const added = connIds.has(u.id);
  return `<div class="user-row" style="animation-delay:${i*.06}s">
    ${avatar(u.avatar,42,C.career)}
    <div class="user-info"><p>${u.name}</p><p>${u.role} · ${u.company}</p></div>
    <button class="connect-btn ${added?'added':''}" onclick="${added?'':`addConnection('${u.id}')`}" ${added?'disabled':''}>${added?ICONS.check+' Added':'+ Connect'}</button>
  </div>`;
}

function filterSearch(q) {
  const connIds=new Set(state.connections.map(c=>c.id));
  const results=$('#searchResults'), suggested=$('#suggestedList');
  if (!q.trim()) { results.innerHTML=''; suggested.classList.remove('hidden'); return; }
  suggested.classList.add('hidden');
  const matches=USERS_DB.filter(u=>!connIds.has(u.id)&&(u.name.toLowerCase().includes(q.toLowerCase())||u.role.toLowerCase().includes(q.toLowerCase())||u.company.toLowerCase().includes(q.toLowerCase())));
  results.innerHTML = matches.length ? matches.map((u,i)=>userRowHTML(u,i,connIds)).join('') : `<p style="text-align:center;padding:40px 0;color:${C.textDim};font-size:13px">No users found</p>`;
}

function addConnection(userId) {
  const user = USERS_DB.find(u=>u.id===userId);
  if (!user || state.connections.find(c=>c.id===userId)) return;
  state.connections.push({...user, connections:[]});
  render();
}

function simulateScan() {
  const connIds=new Set(state.connections.map(c=>c.id));
  const available=USERS_DB.filter(u=>!connIds.has(u.id));
  if(!available.length) return;
  setTimeout(()=>{
    const user=available[Math.floor(Math.random()*available.length)];
    const overlay=$('#scanResultOverlay');
    if(!overlay) return;
    overlay.classList.remove('hidden');
    overlay.innerHTML=`<span style="color:${C.accent};margin-bottom:12px">${ICONS.check}</span><p style="font-size:14px;font-weight:700;margin:0 0 4px">${user.name}</p><p style="color:${C.textDim};font-size:11px;margin:0">${user.role} @ ${user.company}</p>`;
    $('#scanActions').innerHTML=`<div style="display:flex;gap:12px"><button class="nx-btn nx-btn-secondary" style="flex:1" onclick="renderConnectPanel()">Scan Again</button><button class="nx-btn nx-btn-primary" style="flex:1" onclick="addConnection('${user.id}')">Connect</button></div>`;
  },1500);
}

/* ─── VIEW NETWORK OVERLAY ─── */
function openViewNetwork(userId) {
  const user = USERS_DB.find(u=>u.id===userId);
  if (!user) return;
  state.viewingNetwork = user;
  state.selectedNode = null;
  $('#profileCardSlot').innerHTML='';
  renderViewNetwork();
}

  const {nodes,edges} = layoutOtherNetwork(person);

  const myConnIds = new Set(state.connections.map(c=>c.id));
  const network = person.network||[];

  let svgContent = `
    <defs><radialGradient id="viewGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="rgba(96,181,245,0.1)"/><stop offset="100%" stop-color="transparent"/></radialGradient></defs>
    <circle cx="0" cy="0" r="250" fill="url(#viewGlow)" opacity="0.5"/>`;

  edges.forEach(e=>{
    const from=nodeMap[e.from],to=nodeMap[e.to];if(!from||!to)return;
    svgContent+=`<path d="${curvedPath(from.x,from.y,to.x,to.y)}" fill="none" stroke="${C.line}" stroke-width="1.2" opacity="0.4" style="transition:all .4s"/>`;

    svgContent+=`<circle cx="${node.x}" cy="${node.y}" r="${size}" fill="${color}" style="transition:all .3s"/>`;
    if(isMine&&!isCenter)svgContent+=`<circle cx="${node.x+size-1}" cy="${node.y-size+1}" r="4" fill="${C.accent}" stroke="${C.bg}" stroke-width="1.5"/>`;
    svgContent+=`</g>`;
  });

  slot.innerHTML = `
  <div class="screen" style="z-index:1500;background:${C.bg};animation:fadeIn .3s ease">
    <div style="position:absolute;top:0;left:0;right:0;padding:20px 24px;display:flex;align-items:center;gap:16px;z-index:10">

        <p style="font-size:14px;font-weight:700;margin:0">${person.name}'s Network</p>
        <p style="color:${C.textDim};font-size:10px;margin:0;letter-spacing:1.5px;text-transform:uppercase">${network.length} connections · tap a dot to explore</p>

    </div>
    <div style="position:absolute;top:76px;left:50%;transform:translateX(-50%);z-index:10;background:${C.intro}12;border:1px solid ${C.intro}22;border-radius:50px;padding:8px 20px;display:flex;align-items:center;gap:8px">
      <span style="color:${C.intro}">${ICONS.intro}</span>
      <span style="color:${C.intro};font-size:10px;letter-spacing:1px;text-transform:uppercase">Tap someone to request an introduction</span>
    </div>
    <svg viewBox="-250 -250 500 500" style="width:100%;height:100%">${svgContent}</svg>
    <div style="position:absolute;bottom:24px;left:24px;display:flex;gap:16px;color:${C.textDim};font-size:10px;letter-spacing:1px">
      <span style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:${C.accent};display:inline-block"></span> In your network</span>
      <span style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:${C.nodeDefault};display:inline-block"></span> New person</span>
    </div>
    <div id="viewNodeCard"></div>
  </div>`;

  slot.querySelectorAll('[data-vnode]').forEach(g=>{
    const id=g.dataset.vnode;
    const node=nodes.find(n=>n.id===id);
    if(!node||node.isCenter)return;
    g.addEventListener('click',()=>{
      const card=$('#viewNodeCard');
      const isMine=myConnIds.has(node.id);
      card.innerHTML=`
      <div class="profile-card" style="bottom:24px;right:24px">
        <button class="close-btn" onclick="$('#viewNodeCard').innerHTML=''">${ICONS.close}</button>
        ${avatar(node.avatar,44,isMine?C.accent:C.career)}
        <div style="margin-top:14px">
          <p style="font-size:16px;font-weight:700;margin:0 0 2px">${node.name}</p>
          <p style="color:${C.career};font-size:12px;margin:0 0 12px">${node.role} @ ${node.company}</p>
        </div>
        ${node.location?`<div class="detail-row"><span class="detail-label" style="color:${C.location}">Location</span><span class="detail-value">${node.location}</span></div>`:''}
        ${node.education?`<div class="detail-row" style="margin-bottom:16px"><span class="detail-label" style="color:${C.education}">Education</span><span class="detail-value">${node.education}</span></div>`:''}
        ${isMine?`<div style="display:flex;align-items:center;gap:8px;padding:10px 16px;background:${C.accent}11;border-radius:10px;border:1px solid ${C.accent}22"><span style="color:${C.accent}">${ICONS.check}</span><span style="color:${C.accent};font-size:11px">Already in your network</span></div>`
        :`<button class="nx-btn nx-btn-intro" style="width:100%" onclick="openIntroModal('${node.id}','${person.id}')">${ICONS.intro} Ask ${person.name.split(' ')[0]} to Introduce</button>`}
      </div>`;
    });
    g.addEventListener('mouseenter',()=>{
      g.querySelector('circle:not([r="4"])').setAttribute('r',node.isCenter?12:10);
    });
    g.addEventListener('mouseleave',()=>{
      g.querySelector('circle:not([r="4"])').setAttribute('r',node.isCenter?12:7);
    });
  });
}

function closeViewNetwork() { state.viewingNetwork=null; $('#viewNetworkSlot').innerHTML=''; }

/* ─── INTRO MODAL ─── */
function openIntroModal(targetId, mutualId) {
  const person = state.viewingNetwork;
  const target = (person?.network||[]).find(n=>n.id===targetId);
  const mutual = person;
  if (!target||!mutual) return;
  state.introTarget=target; state.introMutual=mutual;
  renderIntroModal();
}

function renderIntroModal() {
  const slot = $('#introModalSlot') || document.body;
  const t=state.introTarget, m=state.introMutual;
  if(!t||!m){slot.innerHTML='';return;}

  const msg=`Hi ${m.name}, could you introduce me to ${t.name}? I'd love to connect about their work at ${t.company}.`;

  slot.innerHTML=`
  <div style="position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px);font-family:'Space Mono',monospace" onclick="closeIntroModal()">
    <div onclick="event.stopPropagation()" style="background:${C.surface};border:1px solid ${C.border};border-radius:20px;padding:32px;width:400px;animation:fadeUp .3s ease" id="introModalContent">
      <h3 style="color:${C.intro};font-size:12px;letter-spacing:2px;text-transform:uppercase;margin:0 0 24px;display:flex;align-items:center;gap:8px">${ICONS.intro} Request Introduction</h3>

      <div style="display:flex;align-items:center;justify-content:center;gap:0;margin:0 0 28px;padding:20px 12px;background:${C.bg};border-radius:12px">
        <div style="text-align:center">${avatar('You',38,C.accent)}<p style="color:${C.accent};font-size:8px;margin-top:6px;letter-spacing:1.5px;text-transform:uppercase">You</p></div>
        <div style="flex:1;max-width:50px;height:2px;background:linear-gradient(90deg,${C.accent},${C.intro});margin:0 6px;margin-bottom:18px"></div>
        <div style="text-align:center">${avatar(m.avatar,38,C.intro,true)}<p style="color:${C.intro};font-size:8px;margin-top:6px;letter-spacing:1.5px;text-transform:uppercase">${m.name.split(' ')[0]}</p></div>
        <div style="flex:1;max-width:50px;height:0;border-top:2px dashed ${C.intro}55;margin:0 6px;margin-bottom:18px"></div>
        <div style="text-align:center">${avatar(t.avatar,38,C.career)}<p style="color:${C.textDim};font-size:8px;margin-top:6px;letter-spacing:1.5px;text-transform:uppercase">${t.name.split(' ')[0]}</p></div>
      </div>

      <div style="background:${C.intro}08;border:1px solid ${C.intro}22;border-radius:10px;padding:10px 14px;margin-bottom:20px;display:flex;gap:10px;align-items:flex-start">
        <span style="color:${C.intro};font-size:14px;margin-top:1px">↗</span>
        <p style="color:${C.textMid};font-size:11px;line-height:1.5;margin:0"><strong style="color:${C.text}">${m.name}</strong> knows <strong style="color:${C.text}">${t.name}</strong> and can introduce you.</p>
      </div>

      <div style="margin-bottom:20px">
        <label class="nx-label">Your message</label>
        <textarea id="introMessage" class="nx-input" rows="3">${msg}</textarea>
      </div>

      <div style="display:flex;gap:12px">
        <button class="nx-btn nx-btn-secondary" style="flex:1" onclick="closeIntroModal()">Cancel</button>
        <button class="nx-btn nx-btn-intro" style="flex:1" onclick="sendIntroRequest()">${ICONS.send} Send Request</button>
      </div>
    </div>
  </div>`;
}

function sendIntroRequest() {
  const t=state.introTarget, m=state.introMutual;
  const content=$('#introModalContent');
  if(!content) return;
  content.outerHTML=`
  <div style="text-align:center;animation:successPop .5s ease">
    <div style="width:80px;height:80px;border-radius:50%;background:${C.accent}22;border:2px solid ${C.accent};display:flex;align-items:center;justify-content:center;margin:0 auto 24px">${ICONS.checkLg}</div>
    <h3 style="font-size:18px;margin:0 0 8px;color:${C.text}">Request Sent!</h3>
    <p style="color:${C.textDim};font-size:12px;max-width:280px;line-height:1.6;margin:0 auto">${m.name} will receive your introduction request for ${t.name}</p>
    <button class="nx-btn nx-btn-secondary" style="margin:24px auto 0" onclick="closeIntroModal()">Done</button>
  </div>`;
}

function closeIntroModal() {
  state.introTarget=null; state.introMutual=null;
  const slot=$('#introModalSlot'); if(slot) slot.innerHTML='';
}

/* ─── INIT ─── */
render();
</script>
</body>
</html>
